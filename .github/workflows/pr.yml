
name: PR Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vet:
    defaults:
      run:
        working-directory: mpd-web-proxy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - run: go mod download

    - name: Go Vet
      run: go vet ./...

  unit-test:
    defaults:
      run:
        working-directory: mpd-web-proxy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - run: go mod download

    - run: go install github.com/jstemmer/go-junit-report/v2@latest

    - name: Unit Test
      run: |
        go test -v ./... | tee test.out
        cat test.out | ~/go/bin/go-junit-report -set-exit-code > junit.xml

    - if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: junit.xml

